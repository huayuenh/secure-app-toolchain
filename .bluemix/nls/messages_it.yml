template.name: "Sviluppare e Distribuire l'applicazione a Kubernetes o OpenShift utilizzando le strategie di distribuzione"
template.description: "Con questa toolchain, puoi sviluppare un'applicazione e distribuire in un unico cluster openshift IBM Kubernetes Service/RedHat o a più cluster utilizzando IBM Satellite. Il modello fornisce scelte per strategie di distribuzione avanzate, come Rolling, Blue/Green o Canary per soddisfare le diverse esigenze. Per impostazione predefinita, la toolchain utilizza un'app Node.js \"Hello World\" di esempio, ma, invece, puoi anche utilizzare la tua app e collegarla ad essa. Questa toolchain è preconfigurata per continuous delivery con [Vulnerability Advisor](https://cloud.ibm.com/docs/services/va?topic=va-va_index), [Code Risk Analyzer](https://cloud.ibm.com/docs/ContinuousDelivery?topic=ContinuousDelivery-cd-configure-cra-repos), controllo origine, issue tracking e modifiche in linea.\n\nPuoi gestire i cluster di contenitori IBM Cloud utilizzando la [console](https://cloud.ibm.com/kubernetes/clusters).Questa toolchain utilizza strumenti che fanno parte del servizio di distribuzione continua. Se un'istanza di tale servizio non è già presente nell'organizzazione o nel gruppo di risorse selezionato, quando fai clic su **Crea**, viene automaticamente aggiunta al piano gratuito [Lite](/catalog/services/continuous-delivery/) selezionato.\n\nPer iniziare, fai clic su **Crea**.\n\nPer istruzioni passo passo segui il [tutorial](https://cloud.ibm.com/docs/ContinuousDelivery?topic=ContinuousDelivery-tutorial-cd-kubernetes)"
template.gettingStarted: " **La tua toolchain è pronta!**\n\n**Avvio rapido:** Eseguire il Commit di una modifica nel repository Git per attivare la creazione di nuove immagini docker, che verranno scansionate per le vulnerabilità e distribuite al cluster Kubernetes. Per istruzioni passo a passo, per questa toolchain, consultare il [tutorial](https://cloud.ibm.com/docs/ContinuousDelivery?topic=ContinuousDelivery-tutorial-cd-kubernetes)."
deploy.longDescription: "Immetti un nome per l'app che desideri distribuire. Crea una nuova chiave API IBM Cloud o utilizza una chiave API IBM Cloud esistente per richiamare la tua configurazione di IBM Container Registry per archiviare l'immagine docker dell'applicazione generata e la configurazione del cluster IBM Kubernetes per distribuire le immagini generate.\n\n**Nota**: Se lo spazio dei nomi del cluster non esiste, viene creato e configurato automaticamente."
deploy.sat.longDescription: "Immetti un nome per l'app che desideri distribuire. Crea una nuova chiave API IBM Cloud o utilizza una chiave API IBM Cloud esistente per richiamare la tua configurazione IBM Container Registry per archiviare la configurazione dell'immagine docker dell'applicazione creata e la configurazione di IBM Satellite per distribuire le immagini create."
deploy.appDescription: "Immetti un nome per l'app che desideri distribuire."
deploy.blueGreen.longDescription: "**Strategia Blue-Green** utilizza due ambienti di produzione permanenti (blu e verde) con un solo traffico ricevente alla volta. Distribuisci la nuova release in ambiente inattivo, quindi commuta tutto il traffico verso di esso senza periodi di inattività. Per un rollback rapido, commuta semplicemente tutto il traffico verso l'altro ambiente rimasto invariato.\n\nImmetti un nome per l'app che desideri distribuire. Crea una nuova chiave API IBM Cloud o utilizza una chiave API IBM Cloud esistente per richiamare la tua configurazione di IBM Container Registry per archiviare l'immagine docker dell'applicazione generata e la configurazione del cluster IBM Kubernetes per distribuire le immagini generate."
deploy.rolling.longDescription: "**Strategia Rolling** distribuisce una nuova release senza periodi di inattività aggiornando in modo incrementale tutte le istanze in modo rapido. Il rollback richiede la ridistribuzione della release precedente, che potrebbe non essere immediata.Immetti un nome per l'app che desideri distribuire. Crea una nuova chiave API IBM Cloud o utilizza una chiave API IBM Cloud esistente per richiamare la tua configurazione di IBM Container Registry per archiviare l'immagine docker dell'applicazione generata e la configurazione del cluster IBM Kubernetes per distribuire le immagini generate."
deploy.canary.longDescription: "**Strategia Canary** distribuisce una nuova release in parallelo con l'ambiente di produzione originale, senza periodi di inattività, quindi vi instrada in modo incrementale più traffico fino a quando non sostituisce l'originale che può essere eliminata. Per un rollback rapido durante il rollout progressivo, tutto il traffico può essere instradato nuovamente all'ambiente di produzione originale.\n\nImmetti un nome per l'app che desideri distribuire. Crea una nuova chiave API IBM Cloud o utilizza una chiave API IBM Cloud esistente per richiamare la tua configurazione di IBM Container Registry per archiviare l'immagine docker dell'applicazione generata e la configurazione del cluster IBM Kubernetes per distribuire le immagini generate."
