deploy.clusterDetails: "**Dettagli del cluster**\n\nSelezionare il cluster IBM Cloud Kubernetes Service e fornire uno spazio dei nomi in cui si intende distribuire l'applicazione. Se lo spazio dei nomi fornito non esiste già, un nuovo spazio dei nomi viene creato dal Pipeline CD durante la distribuzione delle applicazioni. [Ulteriori informazioni]()\n\n"
deploy.containerRegistryDetails: "**Container Registry**\n\nIBM Container Registry archivia le immagini contenitore docker generate dalla pipeline CI. Selezionare la regione del registro del contenitore di destinazione e lo spazio dei nomi in cui si prevede di inviare le immagini docker dell'applicazione generate. [Ulteriori informazioni]()\n\n"
deploy.canary: "**Dettagli Canary**\n\nI rollout Canary deviano gradualmente le richieste degli utenti verso la nuova versione dell'applicazione distribuita sulle istanze del server virtuale. Selezionare la dimensione dell'incremento di traffico e l'intervallo per ogni incremento. [Ulteriori informazioni]()\n\n"
