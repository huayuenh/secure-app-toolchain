wizard.app.title: "Repository delle applicazioni"
wizard.app.longDescription: "Il repository delle applicazioni è il codice sorgente del progetto o del servizio che la pipeline CI crea, verifica e consegna ai registri delle risorse di destinazione.\n\nPer iniziare, la toolchain fornisce una [app NodeJS di esempio](https://us-south.git.cloud.ibm.com/open-toolchain/hello-containers). Se desideri utilizzare un'applicazione esistente invece dell'app NodeJS di esempio, fai clic sulla sezione Avanzate.\n\nPer impostazione predefinita, il modello di repository delle applicazioni verrà clonato nella tua organizzazione Git Repo e Issue Tracking. Per modificare l'organizzazione, abilita **Opzioni avanzate** e modifica il campo **Proprietario repository**."
wizard.app.clone: "Utilizza applicazione di esempio predefinita"
wizard.app.link: "Utilizza la tua applicazione"
wizard.repo.invalidOptionMsg: "È stata scelta un'opzione di configurazione non supportata. Abilitare **Opzioni avanzate**."
wizard.inventory.title: "Repository di inventario"
wizard.inventory.longDescription: "Il repository di inventario registra i dettagli delle risorse create dalla pipeline CI.\n\nÈ possibile scegliere di creare un nuovo repository di inventario, che sarà un clone del [modello di repository di inventario](https://us-south.git.cloud.ibm.com/open-toolchain/inventory) oppure utilizzare un repository di inventario esistente condiviso tra le toolchain.\n\nPer impostazione predefinita, il modello di repository di inventario verrà clonato nell'organizzazione Git Repo and Issue Tracking. Per modificare l'organizzazione, abilita **Opzioni avanzate** e modifica il campo **Proprietario repository**."
wizard.inventory.info: "Per ulteriori informazioni sull'inventario, consultare la [documentazione]()."
wizard.inventory.clone: "Crea nuovo repository di inventario"
wizard.inventory.link: "Utilizza repository di inventario esistente"
wizard.vault.title: "Gestione dei segreti"
wizard.vault.longDescription: "Alcuni strumenti in questa toolchain richiedono segreti per accedere alle risorse privilegiate. Una chiave API di IBM Cloud è un esempio di tale segreto. Tutti i segreti devono essere memorizzati in modo sicuro in un vault di segreti e quindi indicati come richiesto dalla toolchain."
wizard.vault.keyProtect.title: "Key Protect"
wizard.vault.keyProtect.description: "Key Protect è un servizio di sicurezza basato sul cloud che fornisce la gestione del ciclo di vita delle chiavi di crittografia utilizzate nei servizi IBM Cloud o nelle applicazioni create dai clienti."
wizard.vault.secretsManager.title: "Secrets Manager"
wizard.vault.secretsManager.description: "Con Secrets Manager è possibile creare, noleggiare e gestire centralmente i segreti che vengono utilizzati nei servizi IBM Cloud o nelle applicazioni personalizzate."
wizard.vault.hashicorp.title: "HashiCorp Vault"
wizard.vault.notification.title: "Archivio di segreti"
wizard.vault.notification.sutitle: "Come procedura ottimale, memorizzare i segreti in uno dei seguenti strumenti."
wizard.vault.hashicorp.description: "HashiCorp Vault è una soluzione di gestione dei segreti a cui i broker accedono in modo programmatico sia per gli umani che per le macchine."
wizard.vault.info: "Identifica i provider di segreti contenenti i tuoi segreti:"
wizard.deploymentStrategy.title: "Distribuisci"
wizard.deploymentStrategy.longDescription: "La toolchain crea una pipeline Continuous Deployment per distribuire l'immagine docker dell'applicazione al cluster su servizi IBM Kubernetes o gruppi di cluster su IBM Cloud Satellite. Selezionare da una delle seguenti strategie di distribuzione."
wizard.deploymentStrategy.text: "Selezionare una strategia di distribuzione appropriata per l'applicazione"
wizard.deploymentStrategy.rolling.title: "**Rolling**\n\nDistribuisci una nuova release senza periodi di inattività aggiornando in modo incrementale tutte le istanze sequenzialmente."
wizard.deploymentStrategy.blueGreen.title: "**Blue-Green**\n\nDistribuisci una nuova release in un ambiente identico e isolato dalla produzione corrente per rollback più rapidi e facilità di verifica."
wizard.deploymentStrategy.canary.title: "**Canary**\n\nDistribuisci una nuova release in modo incrementale all'ambiente di produzione sostituendo gradualmente la versione più vecchia dell'applicazione con la più nuova, riducendo così i rischi."
wizard.deploymentStrategy.satellite.title: "**Più cluster via Satellite**\n\nDistribuisci una nuova release contemporaneamente a più cluster all'interno di un gruppo di cluster utilizzando [Satellite](https://cloud.ibm.com/satellite/overview).\n\nPer ulteriori dettagli sulla configurazione Satellite, consulta il [tutorial](https://cloud.ibm.com/docs/ContinuousDelivery?topic=ContinuousDelivery-tutorial-cd-satellite)."
wizard.step.deploymentStrategy.title: "Distribuisci"
wizard.optional.tools.title: "Altri strumenti"
wizard.optional.tools.longDescription: "Si tratta di strumenti facoltativi che possono essere inclusi nella tua toolchain."
wizard.summary.title: "Riepilogo"
wizard.summary.success.title: "Congratulazioni"
wizard.summary.success.subtitle: "È stata completata la configurazione della toolchain. Fare clic sul pulsante 'Crea' per creare la toolchain con gli strumenti e le impostazioni scelte."
wizard.deploymentTarget.kubernetes.title: "**Kubernetes**\n\nDistribuire l'app su un cluster IKS o OpenShift su IBM Cloud"
wizard.deploymentTarget.satellite.title: "**Satellite**\n\nDistribuire l'app su un cluster IKS o OpenShift gestito come gruppo di cluster Satellite"
deploy.satelliteClusterGroup: "Nome del gruppo di cluster Satellite"
deploy.satelliteClusterGroupNamespace: "Spazio dei nomi"
deploy.deploymentTarget: "Selezionare dalla destinazione di distribuzione scelta.  Durante l'utilizzo del tipo di destinazione di distribuzione come Kubernetes, richiamare il nome del cluster in base alla scelta della regione del cluster e gruppo di risorse. Nel caso di Satellite, selezionare il nome del gruppo di cluster.\n\n**Nota**: se il namespace del cluster non esiste, viene creato e configurato automaticamente."
deploy.notification.title: "Distribuire su Satellite"
deploy.notification.text: "La strategia di reversione offre un'opzione aggiuntiva per distribuire l'applicazione su un gruppo di cluster gestiti all'interno di IBM Cloud Satellite. Seguire le istruzioni su come [creare gruppi di cluster](https://cloud.ibm.com/satellite/locations/create) per distribuire l'applicazione su un gruppo di cluster configurati all'interno di IBM Cloud Satellite."
deploy.deploymentTarget.kubernetes.info: "Selezionare il nome del cluster in base alla scelta della regione del cluster e del gruppo di risorse in cui si desidera distribuire l'applicazione.\n\n**Nota**: nel caso in cui il namespace del cluster non esista nel cluster selezionato, viene creato dalla pipeline."
deploy.deploymentTarget.satellite.info: "Selezionare il nome del gruppo di cluster e fornire un namespace del cluster in cui distribuire l'applicazione.\n\n**Nota**: nel caso in cui il namespace del cluster fornito non esista nei cluster all'interno del gruppo di cluster, verrà creato nei cluster dalla pipeline."
