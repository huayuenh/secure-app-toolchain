wizard.welcome.description: "Con questa toolchain, puoi e distribuire in modo sicuro un'applicazione su un cluster Kubernetes gestito da IBM Cloud Kubernetes Service. Per impostazione predefinita, la toolchain utilizza un'app Node.js \"Hello World\" di esempio, ma, invece, puoi anche utilizzare la tua app e collegarla ad essa."
