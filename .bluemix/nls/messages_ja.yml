deploy.clusterDetails: "**クラスターの詳細**\n\nIBM Cloud Kubernetes Service クラスターを選択し、アプリケーションをデプロイする予定の名前空間を指定します。 指定された名前空間がまだ存在しない場合は、アプリケーションのデプロイメント中に、CD パイプラインによって新しい名前空間が作成されます。 [詳細情報]()\n\n"
deploy.containerRegistryDetails: "**Container Registry**\n\nIBM Container Registry は、CI パイプラインで作成された Docker コンテナー・イメージを保管します。 ビルドされたアプリケーション Docker イメージをプッシュする予定のターゲット・コンテナー・レジストリーのリージョンおよび名前空間を選択します。 [詳細情報]()\n\n"
deploy.canary: "**カナリアの詳細**\n\nカナリア・ロールアウトは、仮想サーバー・インスタンス上にデプロイされたアプリケーションの新規バージョンに、徐々にユーザー要求を転送します。 トラフィック増分サイズと、増分ごとの間隔を選択します。 [詳細情報]()\n\n"
