deploy.deploymentTarget.kubernetes.info: "アプリケーションをデプロイするクラスター・リージョンとリソース・グループの選択に基づいて、クラスター名を選択します。\n\n**注**: 選択したクラスターにクラスター名前空間が存在しない場合は、パイプラインによって作成されます。"
deploy.deploymentTarget.satellite.info: "クラスター・グループ名を選択し、アプリケーションをデプロイするクラスター名前空間を指定します。\n\n**注**: 指定されたクラスター名前空間がクラスター・グループ内のクラスターに存在しない場合は、パイプラインによってクラスター内に作成されます。"
