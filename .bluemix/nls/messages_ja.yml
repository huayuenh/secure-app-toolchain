template.name: "デプロイメント戦略を使用したアプリケーションの開発と Kubernetes または OpenShift へのデプロイ"
template.description: "このツールチェーンを使用すると、アプリケーションを開発し、IBM Satellite を使用して単一の IBM Kubernetes Service /RedHat openshift クラスターまたは複数クラスターにデプロイすることができます。このテンプレートでは、ニーズに対応するために、ローリング、青/緑、またはカナリアなどの拡張デプロイメント戦略を選択できます。デフォルトでは、サンプルの Node.js「Hello World」アプリがツールチェーンで使用されますが、代わりに独自のアプリを用意して、それにリンクすることもできます。このツールチェーンは、継続的デリバリーに加えて、[脆弱性アドバイザー](https://cloud.ibm.com/docs/services/va?topic=va-va_index)、ソース管理、Issue のトラッキング、およびオンライン編集用に事前構成されています。\n\n[コンソール](https://cloud.ibm.com/kubernetes/clusters)を使用して IBM Cloud コンテナー・クラスターを管理することができます。\n\nこのツールチェーンは、Continuous Delivery サービスの一部であるツールを使用します。そのサービスのインスタンスが、選択したリソース・グループや組織にまだない場合は、 **「作成」** をクリックすると、無料の[ライト](/catalog/services/continuous-delivery/)・プランが選択されてインスタンスが自動的に追加されます。\n\n開始するには、**「作成」** をクリックします。\n\nステップバイステップの説明については、[チュートリアル](https://cloud.ibm.com/docs/ContinuousDelivery?topic=ContinuousDelivery-tutorial-cd-kubernetes)を参照してください。"
template.gettingStarted: " **ツールチェーンの準備ができました。**\n\n**クイック・スタート:** Git リポジトリーに対する変更をコミットして、新しい Docker イメージ・ビルドを起動してください。このビルドは脆弱性についてスキャンされ、Kubernetes クラスターにデプロイされます。 ステップバイステップの説明については、このツールチェーンの[チュートリアル](https://cloud.ibm.com/docs/ContinuousDelivery?topic=ContinuousDelivery-tutorial-cd-kubernetes)を参照してください。"
deploy.longDescription: "デプロイするアプリの名前を入力します。新しい IBM Cloud API キーを作成するか、既存の IBM Cloud API キーを使用して、ビルドされたアプリケーション Docker イメージを保管する IBM Container Registry 構成と、ビルドされたイメージをデプロイする IBM Kubernetes Cluster 構成を取得します。\n\n**注**: クラスター名前空間が存在しない場合は、自動的に作成されて構成されます。"
deploy.sat.longDescription: "デプロイするアプリの名前を入力します。 新しい IBM Cloud API キーを作成するか、既存の IBM Cloud API キーを使用して、ビルドされたアプリケーション Docker イメージを保管する IBM Container Registry 構成と、ビルドされたイメージをデプロイする IBM Satellite 構成を取得します。"
deploy.appDescription: "デプロイするアプリの名前を入力します。"
deploy.blueGreen.longDescription: "**ブルーグリーン戦略** は常に 1 つの受信トラフィックのみを持つ 2 つの永続的な実稼働環境 (ブルーとグリーン) を活用します。 新しいリリースをアイドル環境にデプロイしてから、すべてのトラフィックをダウンタイムなしでそれに切り替えます。 高速ロールバックの場合は、すべてのトラフィックを変更されていない他の環境にすべて切り替えるだけです。\n\nデプロイするアプリの名前を入力します。 新しい IBM Cloud API キーを作成するか、既存の IBM Cloud API キーを使用して、ビルドされたアプリケーション Docker イメージを保管する IBM Container Registry 構成と、ビルドされたイメージをデプロイする IBM Kubernetes Cluster 構成を取得します。"
deploy.rolling.longDescription: "**ローリング戦略** は、すべてのインスタンスを迅速に増分更新することによって、ダウンタイムなしで新しいリリースを導入します。 ロールバックは直前のリリースを再デプロイする必要があり、これは迅速に行えません。\n\nデプロイするアプリの名前を入力します。 新しい IBM Cloud API キーを作成するか、既存の IBM Cloud API キーを使用して、ビルドされたアプリケーション Docker イメージを保管する IBM Container Registry 構成と、ビルドされたイメージをデプロイする IBM Kubernetes Cluster 構成を取得します。"
deploy.canary.longDescription: "**カナリア戦略** は、元の実稼働環境と並行してダウンタイムなしで新しいリリースを導入し、その後、破棄される元の実稼働環境に置き換えられるまで、より多くのトラフィックを段階的にルーティングします。 段階的なロールアウト時の高速ロールバックの場合は、すべてのトラフィックを元の実稼働環境に戻すことができます。\n\nデプロイするアプリの名前を入力します。 新しい IBM Cloud API キーを作成するか、既存の IBM Cloud API キーを使用して、ビルドされたアプリケーション Docker イメージを保管する IBM Container Registry 構成と、ビルドされたイメージをデプロイする IBM Kubernetes Cluster 構成を取得します。"
deploy.appName: "アプリ名"
deploy.apikeyDescription: "IBM Cloud API キーは、IBM Cloud Kubernetes Service API へのアクセス、およびクラスターとの対話に使用されます。 [IBM Cloud コンソール](https://cloud.ibm.com/iam/apikeys) または ibmcloud [iam api-key-create](https://cloud.ibm.com/docs/cli?topic=cli-ibmcloud_commands_iam#ibmcloud_iam_api_key_create) コマンドを使用して、API を作成できます。 "
